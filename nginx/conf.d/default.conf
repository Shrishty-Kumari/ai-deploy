# ---------------------------------------------------------------------------
# DEFAULT CONFIG — works immediately over plain HTTP on server IP or domain.
# This is what ships by default so `docker compose up` works with zero DNS
# or certificate setup. Once you have a domain + certs, switch to
# default.conf.ssl-example (see docs/DEPLOYMENT.md "SSL setup").
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name _;   # catch-all: matches any hostname or bare IP

    # Path reserved for Let's Encrypt HTTP-01 challenge (used once you add a domain)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
